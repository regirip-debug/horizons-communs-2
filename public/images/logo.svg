<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .title { 
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; 
        font-weight: 700; 
        font-size: 42px; 
        fill: #004C54; 
        letter-spacing: 14px; 
      }
      .subtitle { 
        font-family: 'Playfair Display', 'Georgia', serif; 
        font-style: italic; 
        font-weight: 400; 
        font-size: 30px; 
        fill: #B8860B; 
        letter-spacing: 4px; 
      }
    </style>

    <linearGradient id="teal-grad" x1="340" y1="150" x2="460" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006670"/>
      <stop offset="100%" stop-color="#003338"/>
    </linearGradient>

    <linearGradient id="gold-grad" x1="380" y1="170" x2="460" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#996515"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#002226" flood-opacity="0.15"/>
    </filter>

    <mask id="h-mask">
      <rect width="100%" height="100%" fill="white"/>
      <circle cx="460" cy="170" r="18" fill="black"/>
      <circle cx="380" cy="250" r="18" fill="black"/>
    </mask>

    <mask id="c-mask">
      <rect width="100%" height="100%" fill="white"/>
      <line x1="460" y1="280" x2="460" y2="360" stroke="black" stroke-width="36" stroke-linecap="round"/>
    </mask>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <g filter="url(#shadow)">
    
    <g mask="url(#h-mask)" fill="none" stroke="url(#teal-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
      <line x1="340" y1="150" x2="340" y2="350"/>
      <line x1="460" y1="150" x2="460" y2="350"/>
      <line x1="340" y1="250" x2="460" y2="250"/>
    </g>

    <g mask="url(#c-mask)" fill="none" stroke="url(#gold-grad)" stroke-width="24" stroke-linecap="round">
      <path d="M 460 170 A 80 80 0 0 0 460 330"/>
    </g>
    
  </g>

  <text x="407" y="445" text-anchor="middle" class="title">HORIZONS</text>
  <text x="400" y="495" text-anchor="middle" class="subtitle">communs</text>

</svg>
